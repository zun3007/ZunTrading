# ZunTrading configuration
# Secrets KHÔNG để ở đây — dùng .env (xem .env.example)

account:
  # Equity tham chiếu cho PaperExecutor (USD ảo) — đặt BẰNG vốn demo/real thật
  # để mô phỏng paper nhất quán. MT5Executor luôn đọc equity thật từ terminal.
  reference_equity: 500

# 3 risk profile — chuyển trên dashboard (state lưu ở data/risk_profile.json).
# Mạo hiểm nghĩa là LỖ NHANH HƠN KHI SAI, không phải "lời nhiều hơn". Vẫn có trần cứng.
active_risk_profile: can_bang
risk_profiles:
  an_toan:
    max_risk_per_trade_pct: 0.5
    max_total_open_risk_pct: 2.0
    min_rr: 2.0
    max_trades_per_day_per_market: 2
    max_open_positions_per_symbol: 1
    daily_loss_stop_pct: 2.0
    default_confidence: 0.75
    target_winrate: 0.50
  can_bang:
    max_risk_per_trade_pct: 1.0        # rule 1: risk mỗi lệnh ≤ 1% equity
    max_total_open_risk_pct: 3.0       # rule 2: tổng risk vị thế mở ≤ 3% equity
    min_rr: 1.5                        # rule 3: reward/risk tối thiểu
    max_trades_per_day_per_market: 3   # rule 4a
    max_open_positions_per_symbol: 1   # rule 4b
    daily_loss_stop_pct: 3.0           # rule 5: circuit breaker theo ngày (giờ VN)
    default_confidence: 0.65           # rule 6: ngưỡng khi chưa đủ calibration
    target_winrate: 0.50
  mao_hiem:
    max_risk_per_trade_pct: 3.0       # base; bật confidence_sizing → 0.7x–1.5x theo conf (đỉnh 4.5%)
    max_total_open_risk_pct: 9.0
    min_rr: 1.3
    max_trades_per_day_per_market: 5
    max_open_positions_per_symbol: 1
    daily_loss_stop_pct: 8.0
    default_confidence: 0.60
    target_winrate: 0.50
    confidence_sizing: true           # lệnh conf cao ăn size to hơn — trong trần, không phải LLM tự đặt

models:
  # triage=none: BỎ tầng lọc LLM. Prefilter (code) đã lọc rác; Opus vừa giỏi nhất
  # vừa NHANH NHẤT (benchmark: 30.5s vs sonnet 56.4s) nên cho nó quyết thẳng —
  # nhanh ~2x mỗi candidate, và không candidate tốt nào bị loại oan trước khi Opus xem.
  # Đặt 'haiku'/'sonnet' để bật lại tầng lọc rẻ nếu sau này cycle quá nhiều candidate.
  triage: none
  decision: opus       # quyết định cuối — model mạnh nhất, cũng là nhanh nhất
  timeout_seconds: 90

profiles:
  day:
    timeframes: { context: H1, entry: M15 }
    scan_interval_minutes: 15
  swing:
    timeframes: { context: D1, entry: H4 }
    scan_interval_minutes: 240

# value_per_point: USD xấp xỉ cho 1.0 đơn vị giá × 1 lot — dùng cho Paper sizing.
# MT5Executor LUÔN dùng tick_value/tick_size thật từ terminal khi tính lots.
markets:
  gold:
    enabled: true
    session: forex
    scan_hours: "06:30-16:30"   # 13:30-23:30 VN — London + NY, 70%+ volume
    symbols:
      - mt5: XAUUSD
        yfinance: "GC=F"
        binance: null
        value_per_point: 100
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 5.0
  forex:
    enabled: true
    session: forex
    scan_hours: "06:30-16:30"   # 13:30-23:30 VN — London + NY, 70%+ volume
    symbols:
      - mt5: EURUSD
        yfinance: "EURUSD=X"
        binance: null
        value_per_point: 100000
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 5.0
      - mt5: GBPUSD
        yfinance: "GBPUSD=X"
        binance: null
        value_per_point: 100000
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 5.0
      - mt5: USDJPY
        yfinance: "USDJPY=X"
        binance: null
        scan_hours: "00:00-04:00,06:30-16:30"  # JPY ăn cả phiên Á sáng
        value_per_point: 650   # xấp xỉ USD; MT5 runtime dùng tick_value thật
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 5.0
  crypto:
    enabled: true
    session: crypto
    symbols:
      - mt5: BTCUSD
        yfinance: null
        binance: BTCUSDT
        value_per_point: 1
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 10.0
      - mt5: ETHUSD
        yfinance: null
        binance: ETHUSDT
        value_per_point: 1
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 50.0
  indices:
    enabled: true
    session: indices
    scan_hours: "06:30-16:30"   # 13:30-23:30 VN — London + NY, 70%+ volume
    symbols:
      - mt5: USTEC
        yfinance: "^NDX"
        binance: null
        value_per_point: 1
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 10.0
      - mt5: US30
        yfinance: "^DJI"
        binance: null
        value_per_point: 1
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 10.0
  silver:
    enabled: true
    session: forex
    scan_hours: "06:30-16:30"   # 13:30-23:30 VN — London + NY, 70%+ volume
    symbols:
      - mt5: XAGUSD
        yfinance: "SI=F"
        binance: null
        value_per_point: 5000   # tick_value 5 / tick_size 0.001 — verified từ Exness 2026-06-12
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 5.0
  energy:
    enabled: true
    session: forex
    scan_hours: "06:30-16:30"   # 13:30-23:30 VN — London + NY, 70%+ volume
    symbols:
      - mt5: USOIL
        yfinance: "CL=F"
        binance: null
        value_per_point: 1000   # tick 1.0/0.001 — verified
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 5.0
      - mt5: UKOIL
        yfinance: "BZ=F"
        binance: null
        value_per_point: 1000
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 5.0
      - mt5: XNGUSD
        yfinance: "NG=F"
        binance: null
        value_per_point: 10000  # tick 1.0/0.0001
        lot_step: 0.01
        min_lot: 0.01
        max_lot: 5.0

# Né tin lớn (R8): không vào lệnh ±window phút quanh sự kiện HIGH-impact
# của currency liên quan. Nguồn: ForexFactory weekly JSON, cache 4h, fail-open.
news:
  enabled: true
  window_minutes: 30

journal:
  db_path: data/zuntrading.db

report:
  daily_at_local: "21:00"   # giờ VN
